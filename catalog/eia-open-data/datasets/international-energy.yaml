id: eia-international-energy
source_id: eia-open-data
name: EIA International Energy Statistics
entry_level: dataset
entry_kind: panel

api:
  route: /international
  data_endpoint: /international/data
  metadata_endpoint: /international
  example_query: /international/data?data[]=value&facets[countryRegionId][]=USA&facets[productId][]=53&facets[activityId][]=1&frequency=annual

time_index: period
time_grain: [annual, monthly, quarterly]

primary_keys:
  - EIA_ROUTE_PERIOD_COUNTRY_PRODUCT_ACTIVITY

join_keys:
  - DATE
  - ISO_3

field_schema: catalog/eia-open-data/schemas/international-energy.schema.yaml

facets:
  - name: countryRegionId
    description: ISO-3 country code or EIA regional aggregate (OPEC, WORLD, etc.).
    join_key: ISO_3
  - name: productId
    description: Product code (crude oil, natural gas, coal, electricity, etc.).
  - name: activityId
    description: Activity type (production, consumption, imports, exports, reserves).

measures:
  - name: value
    unit: varies (Mb/d for oil, Bcf for gas, Mt for coal, GWh for electricity)
    description: Production, consumption, or trade quantity per country-product-activity.

agent_use_cases:
  - cross-country energy production comparison
  - global oil supply tracking
  - country-level energy independence analysis
  - macro commodity flow modelling
