  description: ''
- name: ash-content
  unit: percent by weight
  description: ''
notes: "Coal reciepts aggregated at state-level data, including price, \r\n      \
  \  quantity, quality, and rank.  Source: EIA Form 7A and MSHA Form 7000-2.  Interactive\
