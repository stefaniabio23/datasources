id: eia-petroleum-spot-prices
source_id: eia-open-data
name: EIA Petroleum Spot Prices
entry_level: dataset
entry_kind: time-series

api:
  route: /petroleum/pri/spt
  data_endpoint: /petroleum/pri/spt/data
  metadata_endpoint: /petroleum/pri/spt
  example_query: /petroleum/pri/spt/data?data[]=value&facets[series][]=RWTC&frequency=daily

time_index: period
time_grain: [daily, weekly, monthly, annual]

primary_keys:
  - EIA_ROUTE_PERIOD_SERIES

join_keys:
  - DATE

field_schema: catalog/eia-open-data/schemas/petroleum-spot-prices.schema.yaml

facets:
  - name: series
    description: EIA series code (RWTC=WTI Cushing, RBRTE=Brent Europe, EER_EPMRU_PF4_Y35NY_DPG=NY Harbor RBOB).
  - name: duoarea
    description: Geographic area code.
  - name: product
    description: Product code (CL crude, GA gasoline, HO heating oil, etc.).

measures:
  - name: value
    unit: dollars per barrel (crude); cents per gallon (refined products)
    description: Spot price.

agent_use_cases:
  - oil price time series
  - WTI vs Brent spread analysis
  - commodity futures input
  - inflation signal construction
