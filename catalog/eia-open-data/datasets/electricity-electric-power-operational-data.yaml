id: eia-electricity-electric-power-operational-data
source_id: eia-open-data
name: EIA Electric Power Operations (Annual and Monthly)
entry_level: dataset
entry_kind: panel
api:
  route: /electricity/electric-power-operational-data
  data_endpoint: /electricity/electric-power-operational-data/data
  metadata_endpoint: /electricity/electric-power-operational-data
time_index: period
time_grain:
- monthly
- quarterly
- annual
primary_keys:
- EIA_ROUTE_PERIOD_LOCATION_SECTORID_FUELTYPEID
join_keys:
- DATE
field_schema: catalog/eia-open-data/schemas/electricity-electric-power-operational-data.schema.yaml
facets:
- name: location
  description: State / Census Region
- name: sectorid
  description: Sector
- name: fueltypeid
  description: Energy Source
measures:
- name: generation
  unit: ''
  description: Utility Scale Electricity Net Generation
- name: total-consumption
  unit: ''
  description: Consumption of Fuels for Electricity Generation and Useful Thermal
    Output (Physical Units)
- name: consumption-for-eg
  unit: ''
  description: Consumption of Fuels for Electricity Generation (Physical Units)
- name: consumption-uto
  unit: ''
  description: Consumption of Fuels for Useful Thermal Output (Physical Units)
- name: total-consumption-btu
  unit: ''
  description: Consumption of Fuels for Electricity Generation and Useful Thermal
    Output (BTUs)
- name: consumption-for-eg-btu
  unit: ''
  description: Consumption of Fuels for Electricity Generation (BTUs)
- name: consumption-uto-btu
  unit: ''
  description: Consumption of Fuels for Useful Thermal Output (BTUs)
- name: stocks
  unit: ''
  description: Stocks of Fuel (Physical Units)
- name: receipts
  unit: ''
  description: Receipts of Fuel (Physical Units)
- name: receipts-btu
  unit: ''
  description: Receipts of Fuel (BTUs)
- name: cost
  unit: ''
  description: Average Cost of Fuels (per Physical Unit)
- name: cost-per-btu
  unit: ''
  description: Average Cost of Fuels (per BTU)
- name: sulfur-content
  unit: ''
  description: Average Sulfur Content of Consumed Fuel
- name: ash-content
  unit: ''
  description: Average Ash Content of Consumed Fuel
- name: heat-content
  unit: ''
  description: Average Heat Content of Consumed Fuels
notes: "Monthly and annual electric power operations by state, sector, and energy\
  \ source.\n    Source: Form EIA-923"
