id: eia-electricity-retail-sales
source_id: eia-open-data
name: EIA Electricity Retail Sales
entry_level: dataset
entry_kind: panel

api:
  route: /electricity/retail-sales
  data_endpoint: /electricity/retail-sales/data
  metadata_endpoint: /electricity/retail-sales
  example_query: /electricity/retail-sales/data?data[]=price&data[]=revenue&data[]=sales&facets[stateid][]=CA&facets[sectorid][]=RES&frequency=monthly

time_index: period
time_grain: [monthly, quarterly, annual]

primary_keys:
  - EIA_ROUTE_PERIOD_STATE_SECTOR

join_keys:
  - DATE
  - US_STATE_CODE

field_schema: catalog/eia-open-data/schemas/electricity-retail-sales.schema.yaml

facets:
  - name: stateid
    description: US state or Census region code.
    join_key: US_STATE_CODE
  - name: sectorid
    description: Electricity end-use sector code.

measures:
  - name: price
    unit: cents per kilowatthour
    description: Average retail price of electricity.
  - name: revenue
    unit: million dollars
    description: Electricity retail revenue.
  - name: sales
    unit: million kilowatthours
    description: Electricity retail sales volume.

agent_use_cases:
  - electricity price time series
  - residential/commercial/industrial demand monitoring
  - state-level energy cost comparison
  - utility revenue tracking
