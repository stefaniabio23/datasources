id: eia-natural-gas-storage
source_id: eia-open-data
name: EIA Natural Gas Storage
entry_level: dataset
entry_kind: panel

api:
  route: /natural-gas/stor
  data_endpoint: /natural-gas/stor/wkly/data
  metadata_endpoint: /natural-gas/stor
  example_query: /natural-gas/stor/wkly/data?data[]=value&facets[duoarea][]=NUS&frequency=weekly

time_index: period
time_grain: [weekly, monthly, annual]

primary_keys:
  - EIA_ROUTE_PERIOD_DUOAREA_PROCESS

join_keys:
  - DATE

field_schema: catalog/eia-open-data/schemas/natural-gas-storage.schema.yaml

facets:
  - name: duoarea
    description: Geographic region (NUS=Lower 48 total, R31-R34=East/Midwest/Mountain/Pacific storage regions, S1-S5=salt/non-salt sub-regions).
  - name: process
    description: Storage operation type (SAW=working gas, SAB=base gas, STR=total).

measures:
  - name: value
    unit: billion cubic feet
    description: Natural gas in storage.

agent_use_cases:
  - winter heating demand signal
  - natural gas price forecasting input
  - power generation feedstock monitoring
  - weekly storage report leading indicator
