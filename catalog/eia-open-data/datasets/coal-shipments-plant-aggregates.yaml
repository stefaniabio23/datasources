id: eia-coal-shipments-plant-aggregates
source_id: eia-open-data
name: EIA Plant Aggregates
entry_level: dataset
entry_kind: panel
api:
  route: /coal/shipments/plant-aggregates
  data_endpoint: /coal/shipments/plant-aggregates/data
  metadata_endpoint: /coal/shipments/plant-aggregates
time_index: period
time_grain:
- quarterly
- annual
primary_keys:
- EIA_ROUTE_PERIOD_LOCATION_PLANT_RANK
join_keys:
- DATE
field_schema: catalog/eia-open-data/schemas/coal-shipments-plant-aggregates.schema.yaml
facets:
- name: location
  description: Plant State\Region.
- name: plant
  description: Plant
- name: rank
  description: Coal Rank
measures:
- name: quantity
  unit: tons
  description: ''
- name: price
  unit: average dollars per ton
  description: ''
- name: sulfur-content
  unit: percent by weight
  description: ''
- name: ash-content
  unit: percent by weight
  description: ''
- name: heat-content
  unit: Btu per pound
  description: ''
notes: "Coal reciepts aggregated to plant-level data, \n        including price, quantity,\
  \ quality, and rank.  Source: EIA Form 7A \n            and MSHA Form 7000-2.  Interactive\
  \ browser:  https://www.eia.gov/coal/data/browser/"
