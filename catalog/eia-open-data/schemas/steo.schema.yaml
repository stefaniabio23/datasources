dataset_id: eia-steo
source_id: eia-open-data

fields:
  - name: period
    type: string
    description: Observation period (mixes historical and forecast months).
    role: time_index
    join_key: DATE
    required: true
    examples: ["2024-01", "2025-12", "2030"]

  - name: seriesId
    type: string
    description: STEO series identifier.
    role: dimension
    required: true
    examples: ["WTIPUUS", "COPRPUS", "CIPRPUS"]

  - name: seriesDescription
    type: string
    description: Human-readable series name.
    role: label
    required: false

  - name: value
    type: number
    description: Forecast or historical value depending on period.
    role: measure
    unit: varies by series (consult metadata endpoint)
    required: false

  - name: units
    type: string
    description: Unit string for this series.
    role: metadata
    required: false
