name: Publish to Google Sheet

on:
  push:
    branches: [main]
    paths:
      - 'entries/**'
      - 'schema/**'
      - 'scripts/generate.py'
      - 'scripts/publish_to_sheet.py'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml jsonschema google-api-python-client google-auth

      - name: Validate entries
        run: python3 scripts/validate_entries.py

      - name: Generate outputs
        run: python3 scripts/generate.py

      - name: Publish to Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python3 scripts/publish_to_sheet.py

      # Rebuild the stephanierebecca.com site so its /datasets page re-fetches
      # this registry (the page pulls generated/index.json at build time). A
      # Cloudflare Pages deploy hook rebuilds the whole site; only the datasets
      # page's output changes. No-op until CLOUDFLARE_DEPLOY_HOOK is set.
      - name: Refresh website datasets page
        env:
          HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK" -o /dev/null && echo "triggered website rebuild"
          else
            echo "CLOUDFLARE_DEPLOY_HOOK not set; skipping website rebuild"
          fi
