# JSON Schema 2020-12 for catalog/<source_id>/schemas/<dataset_id>.schema.yaml.
# Field-level metadata for a single catalog dataset.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "datasources/schema/field-schema.schema.yaml"
title: Dataset Field Schema
type: object
additionalProperties: false

required:
  - dataset_id
  - source_id
  - fields

properties:
  dataset_id:
    type: string

  source_id:
    type: string

  fields:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [name, type, role]
      properties:
        name:
          type: string
          description: Source-side field name as returned by the API or column header in bulk files.
        type:
          type: string
          enum: [string, number, integer, boolean, date, datetime, geometry, array, object]
        description:
          type: string
        role:
          type: string
          enum:
            - primary_key
            - join_key
            - time_index
            - dimension
            - measure
            - label
            - metadata
            - url
            - geometry
            - text
          description: Tells agents what to do with this column. `dimension` is a categorical slice. `measure` is a numeric quantity. `time_index` is the time axis. `label` is a human-readable alias for a `dimension`.
        join_key:
          type: string
          description: Canonical join_key from schema/join-keys.yaml that this field maps to. Required when role is `join_key`.
        unit:
          type: string
          description: Unit string for measures (e.g. "cents per kilowatthour", "USD millions").
        required:
          type: boolean
        examples:
          type: array
          items: {}
