# JSON Schema 2020-12, expressed in YAML.
# Defines the YAML frontmatter of every entries/<domain>/<slug>.md file.
# MVP: minimal fields needed for agent decision-making.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "datasources/schema/entry.schema.yaml"
title: Dataset Entry
type: object
additionalProperties: false

required:
  - id
  - name
  - domain
  - entry_kind
  - description
  - homepage_url
  - type
  - auth_required
  - cost
  - license
  - join_keys
  - mcp_status
  - last_verified

properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"

  name:
    type: string

  domain:
    type: string
    enum:
      - academic
      - clinical-biotech
      - bio-genomics
      - public-health
      - healthcare-claims
      - finance-markets
      - corporate-registry
      - news-events
      - consumer-signal
      - government-open-data
      - geospatial

  entry_kind:
    type: string
    enum:
      - registry
      - time-series
      - panel
      - event-stream
      - knowledge-graph
      - corpus
      - reference-table
      - geospatial
      - mixed
    description: High-level classification of what kind of source this is. Required; lets agents filter by query shape (give me time-series of X, give me an entity registry for Y).

  description:
    type: string

  homepage_url:
    type: string
    format: uri

  docs_url:
    type: string
    format: uri

  type:
    type: array
    minItems: 1
    items:
      type: string
      enum:
        - rest-api
        - bulk-download
        - dataset-dump
        - database
        - web-ui
        - scraper-required
        - unofficial-api
        - socrata
        - odata
        - powerbi-export

  auth_required:
    type: string
    enum:
      - none
      - api-key-free
      - api-key-paid
      - account-required
      - oauth
      - dars-or-equivalent

  cost:
    type: string
    enum:
      - free
      - freemium
      - paid
      - free-with-registration
      - free-non-commercial

  license:
    type: string

  rate_limit:
    type: string

  bulk_available:
    type: boolean

  frequency:
    type: string

  lag:
    type: string

  geography:
    type: array
    items: { type: string }

  join_keys:
    type: array
    items: { type: string }
    description: Canonical join keys from schema/join-keys.yaml that this source exposes for cross-source joining.

  primary_keys:
    type: array
    items: { type: string }
    description: Source-native identifiers the source mints to uniquely identify its own entities (e.g. OPENALEX_WORK_ID, COMPANIES_HOUSE_OFFICER_ID, GLOBALEVENTID). Free-form, do not need to appear in schema/join-keys.yaml. An ID can appear in both primary_keys and join_keys when the source mints it AND it is in the canonical registry (e.g. COMPANIES_HOUSE_NUMBER).

  join_key_fields:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [join_key, fields]
      properties:
        join_key:
          type: string
          description: A canonical key listed in this entry's join_keys.
        fields:
          type: array
          items: { type: string }
          description: Source-side field paths where the join_key appears in actual response payloads (e.g. "ids.doi", "authorships.institutions.ror").
    description: For each canonical join_key the source exposes, the source-side field paths that carry it. Lets the generator (and agents) know where to look in real payloads.

  mcp_status:
    type: string
    enum:
      - mcp-exists
      - mcp-needed-high-value
      - mcp-needed-low-value
      - api-direct-sufficient
      - requires-scraping
      - fragile-unofficial

  mcp_maturity:
    type: string
    enum:
      - official
      - community
      - experimental
      - none

  mcp_package:
    type: array
    items: { type: string }
    description: List of package names or repo URLs. Use a list (not a string) even when only one MCP exists; multiple community MCPs are common.

  mcp_notes:
    type: string

  mcp_command:
    type: array
    items: { type: string }
    description: Run command(s) for MCP server(s) that expose this source (e.g. "uvx --from biomcp-python biomcp run"). Multi-source MCP servers appear on every source they cover; note required env in the string (e.g. "set OPENALEX_EMAIL").

  agent_use_cases:
    type: array
    items: { type: string }

  access_test:
    type: object
    additionalProperties: false
    required: [command]
    properties:
      command: { type: string }
      expected_status: { type: integer }
      expected_fields:
        type: array
        items: { type: string }

  last_verified:
    type: string
    format: date

  build_priority:
    type: string
    enum: [high, medium, low]

  notes:
    type: string

  # ---------------------------------------------------------------- v3 additions
  # Optional fields added 2026-06-10 to support consumer-side reasoning about
  # provenance and point-in-time reconstruction. None are required; existing
  # entries remain valid without them.

  is_directory:
    type: boolean
    description: |
      True when this entry is a source-discovery directory (data.gov, FRED's
      catalog, Nasdaq Data Link, etc.) rather than a primary data source.
      A directory is just a source with is_directory: true; consumers can
      use it to find further sources and to attribute discovered_via on
      those downstream entries.

  discovered_via:
    type: string
    description: |
      The id of the directory or upstream source that surfaced this entry.
      Lets consumers ask "which discovery channels yield signals that
      survive out-of-sample?" without building a separate provenance layer.

  structure:
    type: string
    enum:
      - panel
      - time-series
      - cross-section
      - event-log
      - registry-snapshot
    description: |
      Data-shape classification orthogonal to entry_kind (which describes
      source kind). structure captures what the data PERMITS for analysis:
      a registry kept as snapshots becomes a registry-snapshot; the same
      registry queried with vintage history becomes an event-log; etc.
      The binary "time-series vs registry" leaks at the edges; this is
      tighter. Optional; consumers fall back to entry_kind when absent.

  pit_reconstructable:
    type: boolean
    description: |
      True when the source supports point-in-time reconstruction (vintage
      data retrievable for any past date). False is the conservative
      default and forces analysts to curate vintage handling explicitly
      rather than assuming it. Distinct from point_in_time_safe, which is
      about per-observation observability at T + release_lag_days.

  revisions_possible:
    type: boolean
    description: |
      True when values get restated after first publication (most macro
      series, retail sales, employment data). A backtest against a
      revisions-possible target without vintage reconstruction may be
      optimistic relative to what the analyst would have seen in real time.

  release_lag_days:
    type: integer
    minimum: 0
    description: |
      Integer days from observation to publication. Distinct from the
      free-form `lag` field, which describes the lag in prose. When both
      are present, release_lag_days is the operational value the pipeline
      uses; `lag` is human-readable context.
